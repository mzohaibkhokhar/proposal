<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rabia ❤️ Date Proposal</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#ff758c,#ff7eb3,#fad0c4,#fbc2eb,#a6c1ee);
overflow:hidden;
height:100vh;
}

.page{
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
height:100vh;
text-align:center;
}

.active{
display:flex;
}

.card{
background:rgba(255,255,255,.2);
backdrop-filter:blur(15px);
padding:40px;
border-radius:30px;
width:90%;
max-width:700px;
box-shadow:0 10px 30px rgba(0,0,0,.3);
}

h1{
color:white;
font-size:60px;
margin-bottom:20px;
}

h2{
color:white;
margin-bottom:20px;
}

p{
color:white;
font-size:20px;
margin-bottom:20px;
}

button{
padding:15px 35px;
border:none;
border-radius:50px;
font-size:18px;
cursor:pointer;
background:#ff4081;
color:white;
margin:10px;
transition:.4s;
}

button:hover{
transform:scale(1.1);
}

.option{
background:white;
padding:15px;
margin:10px;
border-radius:15px;
font-size:18px;
}

select{
padding:15px;
font-size:18px;
border:none;
border-radius:15px;
width:250px;
margin:20px;
}

.heart{
position:absolute;
font-size:30px;
animation:float 5s linear infinite;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:1;
}
100%{
transform:translateY(-100vh);
opacity:0;
}
}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

.love{
font-size:80px;
animation:pulse 1s infinite;
}

@keyframes pulse{
50%{
transform:scale(1.1);
}
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<!-- PAGE 1 -->
<div class="page active" id="page1">
<div class="card">
<h1>❤️ Rabia ❤️</h1>
<p>Will You Go On A Beautiful Date With Me? 🌹</p>
<button onclick="nextPage(2)">YES ❤️</button>
</div>
</div>

<!-- PAGE 2 -->
<div class="page" id="page2">
<div class="card">
<h2>🍕 Select Your Favourite Foods</h2>

<div class="option"><input type="checkbox"> Chicken Biryani 🍛</div>
<div class="option"><input type="checkbox"> Pizza 🍕</div>
<div class="option"><input type="checkbox"> Burger 🍔</div>
<div class="option"><input type="checkbox"> Pasta 🍝</div>
<div class="option"><input type="checkbox"> Shawarma 🌯</div>
<div class="option"><input type="checkbox"> Ice Cream 🍨</div>

<button onclick="nextPage(3)">Next ❤️</button>
</div>
</div>

<!-- PAGE 3 -->
<div class="page" id="page3">
<div class="card">
<h2>⏰ Select Time</h2>

<select>
<option>4:00 PM</option>
<option>5:00 PM</option>
<option>6:00 PM</option>
<option>7:00 PM</option>
</select>

<br>

<button onclick="nextPage(4)">Next ❤️</button>
</div>
</div>

<!-- PAGE 4 -->
<div class="page" id="page4">
<div class="card">
<h2>📍 Select Place</h2>

<select>
<option>🌳 Shalimar Garden</option>
<option>🏰 Shahi Qila</option>
<option>🌄 Monal</option>
</select>

<br>

<button onclick="showLove()">Confirm ❤️</button>
</div>
</div>

<!-- PAGE 5 -->
<div class="page" id="page5">
<div class="card">
<h1 class="love">❤️ I LOVE YOU ❤️</h1>

<p>
Rabia ❤️<br><br>
Thank you for making my life beautiful 🌹💕
</p>
</div>
</div>

<script>

function nextPage(page){
document.querySelectorAll(".page").forEach(p=>{
p.classList.remove("active");
});

document.getElementById("page"+page).classList.add("active");
}

function showLove(){
nextPage(5);
fireworks();
}

// Floating Hearts
setInterval(()=>{
let heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(20+Math.random()*40)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},5000);

},300);


// FIREWORKS
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

function fireworks(){

setInterval(()=>{

let x=Math.random()*canvas.width;
let y=Math.random()*canvas.height/2;

for(let i=0;i<80;i++){

let angle=Math.random()*Math.PI*2;
let speed=Math.random()*5;

let dx=Math.cos(angle)*speed;
let dy=Math.sin(angle)*speed;

let color=`hsl(${Math.random()*360},100%,50%)`;

animateParticle(x,y,dx,dy,color);

}

},800);

}

function animateParticle(x,y,dx,dy,color){

let life=100;

function draw(){

if(life<=0) return;

ctx.fillStyle="rgba(0,0,0,0.15)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.beginPath();
ctx.fillStyle=color;
ctx.arc(x,y,3,0,Math.PI*2);
ctx.fill();

x+=dx;
y+=dy;
dy+=0.03;

life--;

requestAnimationFrame(draw);

}

draw();
}

</script>

</body>
</html>
